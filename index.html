<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arul & Jeeva</title>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,#f7f4ff,#e8e2ff);
  color:#2b1b4d;
  text-align:center;
}

header {
  padding:50px 20px 20px;
}

.quote {
  opacity:.85;
  font-style:italic;
}

#spiritual img {
  max-width:90%;
  border-radius:20px;
  margin:30px 0;
}

#upload-section {
  padding:20px;
}

button {
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#8a6cff;
  color:white;
  cursor:pointer;
}

#album-gallery {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:20px;
  padding:20px;
}

.album {
  background:white;
  border-radius:12px;
  padding:10px;
  cursor:pointer;
}

.album img {
  width:100%;
  border-radius:10px;
}

#photo-grid {
  display:none;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:15px;
  padding:20px;
}

#photo-grid img {
  width:100%;
  border-radius:10px;
}
</style>

</head>
<body>

<header>
<h1>Arul & Jeeva</h1>
<p class="quote">Every shared moment is a meditation, a bridge connecting our inner worlds.</p>
</header>

<div id="spiritual">
<img src="https://res.cloudinary.com/dtamlqfx3/image/upload/v1771768963/spiritual-section_cmf3ue.png">
</div>

<div id="upload-section">
<input type="text" id="momentName" placeholder="Moment Name">
<input type="file" id="fileInput" multiple>
<button onclick="upload()">Upload</button>
</div>

<div id="album-gallery"></div>

<div id="photo-grid"></div>
<button id="backBtn" onclick="back()" style="display:none;">Back</button>

<script>

const backend="https://arul-jeeva.vercel.app/albums";
const cloud="dtamlqfx3";
const preset="aruljeeva";

async function load(){

  const res=await fetch(backend+"?t="+Date.now());
  const albums=await res.json();

  const gallery=document.getElementById("album-gallery");
  gallery.innerHTML="";

  albums.forEach(a=>{
    const div=document.createElement("div");
    div.className="album";
    div.innerHTML=`<img src="${a.thumbnail}"><p>${a.name}</p>`;
    div.onclick=()=>open(a);
    gallery.appendChild(div);
  });

}

function open(album){

  document.getElementById("album-gallery").style.display="none";
  document.getElementById("photo-grid").style.display="grid";
  document.getElementById("backBtn").style.display="block";

  const grid=document.getElementById("photo-grid");
  grid.innerHTML="";

  album.photos.forEach(p=>{
    const img=document.createElement("img");
    img.src=p;
    grid.appendChild(img);
  });

}

function back(){

  document.getElementById("album-gallery").style.display="grid";
  document.getElementById("photo-grid").style.display="none";
  document.getElementById("backBtn").style.display="none";

}

async function upload(){

  const name=document.getElementById("momentName").value||"Default";
  const files=document.getElementById("fileInput").files;

  for(const f of files){

    const fd=new FormData();
    fd.append("file",f);
    fd.append("upload_preset",preset);
    fd.append("folder",name);

    await fetch(`https://api.cloudinary.com/v1_1/${cloud}/upload`,{
      method:"POST",
      body:fd
    });

  }

  load();

}

load();

</script>

</body>
</html>
