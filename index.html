<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Arul & Jeeva</title>

<style>
:root{
  --bg:#0b0b12;
  --card:rgba(255,255,255,.08);
  --card2:rgba(255,255,255,.12);
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.65);
  --border:rgba(255,255,255,.14);
  --shadow:0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(900px 500px at 20% 10%, rgba(140,70,255,.25), transparent 60%),
    radial-gradient(900px 500px at 80% 20%, rgba(0,220,255,.18), transparent 60%),
    radial-gradient(1000px 600px at 50% 90%, rgba(255,70,180,.14), transparent 60%),
    var(--bg);
  min-height:100vh;
}

header{ text-align:center; padding:18px; }
.brand-title{ font-size:28px; font-weight:900; }
.brand-sub{ color:var(--muted); margin-top:6px; }

.hero{ max-width:1100px; margin:auto; padding:18px; }
.hero img{
  width:100%;
  border-radius:18px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  display:block;
}

/* New: message + counter */
.cosmicMessage{
  text-align:center;
  margin-top:18px;
  font-size:18px;
  font-weight:650;
  color:rgba(255,255,255,.92);
}
.loveCounter{
  text-align:center;
  margin-top:10px;
  font-size:14px;
  color:rgba(255,255,255,.65);
  line-height:1.5;
}

main{ max-width:1100px; margin:auto; padding:18px; }

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
}

.cardBtn{
  border:1px solid var(--border);
  border-radius:16px;
  background:var(--card);
  padding:10px;
  cursor:pointer;
  box-shadow:var(--shadow);
  transition:.15s;
}
.cardBtn:hover{ background:var(--card2); transform:translateY(-2px); }

.albumThumb{
  width:100%;
  height:120px;
  border-radius:12px;
  overflow:hidden;
  margin-bottom:8px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.06);
  display:flex;
  align-items:center;
  justify-content:center;
  color:rgba(255,255,255,.55);
  font-size:12px;
}
.albumThumb img, .albumThumb video{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  background:#000;
}

.cardTitle{
  font-weight:900;
  font-size:14px;
}

.imagesGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;
}

.imgCard{
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--border);
  background:rgba(255,255,255,.05);
  box-shadow:var(--shadow);
}
.imgCard img, .imgCard video{
  width:100%;
  height:200px;
  object-fit:cover;
  display:block;
  cursor:pointer;
  background:#000;
}

.actionsBottom{
  margin-top:20px;
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn, .uploadLabel{
  padding:12px 16px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  cursor:pointer;
}
.uploadLabel input{ display:none; }

.hidden{ display:none !important; }

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.95);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.lightboxContent{ position:relative; max-width:95vw; max-height:90vh; }
.lightbox img, .lightbox video{
  max-width:95vw;
  max-height:90vh;
  display:block;
}
.lightboxClose{
  position:absolute;
  top:-10px;
  right:-10px;
  width:40px;
  height:40px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.10);
  color:#fff;
  font-size:26px;
  line-height:36px;
  text-align:center;
  cursor:pointer;
  user-select:none;
}
</style>
</head>

<body>

<header>
  <div class="brand-title">Arul & Jeeva</div>
  <div class="brand-sub">Every shared moment is a meditation, a bridge connecting our inner worlds.</div>
</header>

<section class="hero">
  <img src="https://res.cloudinary.com/dtamlqfx3/image/upload/v1771768963/spiritual-section_cmf3ue.png" alt="Spiritual">

  <div class="cosmicMessage">
    From the moment our paths crossed, time began to remember itself.
  </div>

  <div id="loveCounter" class="loveCounter"></div>
</section>

<main>

  <section id="albumsView">
    <h2>Albums</h2>
    <div id="albumsGrid" class="grid"></div>
  </section>

  <section id="imagesView" class="hidden">
    <button id="backBtn" class="btn">← Back</button>
    <h2 id="albumTitle"></h2>
    <div id="imagesGrid" class="imagesGrid"></div>
  </section>

  <div class="actionsBottom">
    <button id="newAlbumBtn" class="btn">+ New Album</button>

    <label class="uploadLabel">
      Upload
      <input id="fileInput" type="file" multiple accept="image/*,video/*">
    </label>

    <button id="refreshBtn" class="btn">Refresh</button>
  </div>

</main>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox hidden">
  <div class="lightboxContent" id="lightboxContent">
    <div class="lightboxClose" id="lightboxClose">×</div>
    <img id="lightboxImg" class="hidden" alt="">
    <video id="lightboxVideo" class="hidden" controls playsinline></video>
  </div>
</div>

<script>
const API_BASE = "https://arul-jeeva.vercel.app";

const albumsGrid = document.getElementById("albumsGrid");
const imagesGrid = document.getElementById("imagesGrid");
const albumTitle = document.getElementById("albumTitle");
const albumsView = document.getElementById("albumsView");
const imagesView = document.getElementById("imagesView");
const fileInput = document.getElementById("fileInput");

const backBtn = document.getElementById("backBtn");
const refreshBtn = document.getElementById("refreshBtn");
const newAlbumBtn = document.getElementById("newAlbumBtn");

// Lightbox
const lightbox = document.getElementById("lightbox");
const lightboxContent = document.getElementById("lightboxContent");
const lightboxClose = document.getElementById("lightboxClose");
const lightboxImg = document.getElementById("lightboxImg");
const lightboxVideo = document.getElementById("lightboxVideo");

let currentAlbum = null;

// Close lightbox when clicking outside content
lightbox.addEventListener("click", () => closeLightbox());
lightboxContent.addEventListener("click", (e) => e.stopPropagation());
lightboxClose.addEventListener("click", (e) => { e.stopPropagation(); closeLightbox(); });

// --- Exact time elapsed since first meeting (23-Feb-2023) ---
const firstMeeting = new Date(2023, 1, 23, 0, 0, 0); // local time: Feb is 1
const counterEl = document.getElementById("loveCounter");

function pad2(n){ return String(n).padStart(2, "0"); }

function addMonths(date, months){
  const d = new Date(date.getTime());
  const origDay = d.getDate();
  d.setMonth(d.getMonth() + months);

  // If month overflow adjusted day (e.g. 31st), clamp to last day of target month
  if (d.getDate() !== origDay) {
    d.setDate(0); // last day of previous month
  }
  return d;
}

function computeYMDHMS(from, to){
  if (to < from) return {years:0, months:0, days:0, hours:0, minutes:0, seconds:0};

  // Years
  let years = to.getFullYear() - from.getFullYear();
  let anchor = new Date(from.getTime());
  anchor.setFullYear(from.getFullYear() + years);

  if (anchor > to) {
    years--;
    anchor = new Date(from.getTime());
    anchor.setFullYear(from.getFullYear() + years);
  }

  // Months
  let months = (to.getMonth() - anchor.getMonth()) + 12 * (to.getFullYear() - anchor.getFullYear());
  let anchor2 = addMonths(anchor, months);

  if (anchor2 > to) {
    months--;
    anchor2 = addMonths(anchor, months);
  }

  // Remaining milliseconds -> days/hours/min/sec
  let ms = to - anchor2;
  const dayMs = 24*60*60*1000;
  const hourMs = 60*60*1000;
  const minMs = 60*1000;

  const days = Math.floor(ms / dayMs); ms -= days * dayMs;
  const hours = Math.floor(ms / hourMs); ms -= hours * hourMs;
  const minutes = Math.floor(ms / minMs); ms -= minutes * minMs;
  const seconds = Math.floor(ms / 1000);

  return { years, months, days, hours, minutes, seconds };
}

function updateLoveCounter(){
  const now = new Date();
  const t = computeYMDHMS(firstMeeting, now);

  counterEl.innerHTML =
    `<div><b>${t.years}</b> years, <b>${t.months}</b> months, <b>${t.days}</b> days</div>` +
    `<div><b>${pad2(t.hours)}</b> hours, <b>${pad2(t.minutes)}</b> minutes, <b>${pad2(t.seconds)}</b> seconds since our first meeting</div>`;
}

updateLoveCounter();
setInterval(updateLoveCounter, 1000);

// --- App logic ---
function showAlbums(){
  imagesView.classList.add("hidden");
  albumsView.classList.remove("hidden");
  currentAlbum = null;
}

function showImages(albumPath){
  albumsView.classList.add("hidden");
  imagesView.classList.remove("hidden");
  currentAlbum = albumPath;
  albumTitle.textContent = albumPath;
}

async function fetchJson(url){
  const res = await fetch(url, { cache: "no-store" });
  const data = await res.json();
  return { res, data };
}

async function getThumbItem(albumPath){
  const url = `${API_BASE}/api/images?album=${encodeURIComponent(albumPath)}&max=1`;
  const { data } = await fetchJson(url);
  if(!data.ok) return null;
  return (data.images && data.images[0]) ? data.images[0] : null;
}

async function loadAlbums(){
  showAlbums();
  albumsGrid.innerHTML = "";

  const { data } = await fetchJson(`${API_BASE}/api/albums`);
  if(!data.ok){
    albumsGrid.textContent = "Failed to load albums.";
    return;
  }

  const albums = data.albums || [];
  for(const album of albums){
    const card = document.createElement("div");
    card.className = "cardBtn";
    card.addEventListener("click", () => openAlbum(album.path));

    const thumb = document.createElement("div");
    thumb.className = "albumThumb";
    thumb.textContent = "Loading…";

    const title = document.createElement("div");
    title.className = "cardTitle";
    title.textContent = album.name;

    card.appendChild(thumb);
    card.appendChild(title);
    albumsGrid.appendChild(card);

    // Load thumbnail safely
    try{
      const item = await getThumbItem(album.path);
      if(!item){
        thumb.textContent = "No photos yet";
        continue;
      }

      const url = item.secure_url || "";
      const isVideo = item.resource_type === "video" || /\.(mp4|mov|webm|m4v)(\?|$)/i.test(url);

      thumb.innerHTML = "";
      if(isVideo){
        const v = document.createElement("video");
        v.src = url;
        v.muted = true;
        v.playsInline = true;
        v.preload = "metadata";
        thumb.appendChild(v);
      }else{
        const img = document.createElement("img");
        img.src = url;
        img.loading = "lazy";
        thumb.appendChild(img);
      }
    }catch(e){
      thumb.textContent = "No cover";
    }
  }
}

async function openAlbum(albumPath){
  showImages(albumPath);
  imagesGrid.innerHTML = "";

  const url = `${API_BASE}/api/images?album=${encodeURIComponent(albumPath)}&max=100`;
  const { data } = await fetchJson(url);

  if(!data.ok){
    imagesGrid.textContent = "Failed to load images.";
    return;
  }

  const items = data.images || [];
  for(const item of items){
    const card = document.createElement("div");
    card.className = "imgCard";

    const url = item.secure_url || "";
    const isVideo = item.resource_type === "video" || /\.(mp4|mov|webm|m4v)(\?|$)/i.test(url);

    if(isVideo){
      const v = document.createElement("video");
      v.src = url;
      v.controls = true;
      v.playsInline = true;
      v.addEventListener("click", (e) => { e.preventDefault(); e.stopPropagation(); openLightbox(url, "video"); });
      card.appendChild(v);
    }else{
      const img = document.createElement("img");
      img.src = url;
      img.loading = "lazy";
      img.addEventListener("click", (e) => { e.preventDefault(); e.stopPropagation(); openLightbox(url, "image"); });
      card.appendChild(img);
    }

    imagesGrid.appendChild(card);
  }
}

function openLightbox(url, type){
  lightbox.classList.remove("hidden");

  if(type === "video"){
    lightboxImg.classList.add("hidden");
    lightboxVideo.classList.remove("hidden");
    lightboxVideo.src = url;
    lightboxVideo.currentTime = 0;
  }else{
    lightboxVideo.classList.add("hidden");
    lightboxImg.classList.remove("hidden");
    lightboxImg.src = url;
  }
}

function closeLightbox(){
  lightbox.classList.add("hidden");

  lightboxVideo.pause();
  lightboxVideo.removeAttribute("src");
  lightboxVideo.load();

  lightboxImg.removeAttribute("src");
}

backBtn.addEventListener("click", () => showAlbums());

refreshBtn.addEventListener("click", async () => {
  if(currentAlbum) await openAlbum(currentAlbum);
  else await loadAlbums();
});

newAlbumBtn.addEventListener("click", async () => {
  const name = prompt("Album name:");
  if(!name) return;
  const trimmed = name.trim();
  if(!trimmed) return;
  await openAlbum(trimmed);
});

// Upload
fileInput.addEventListener("change", async () => {
  const files = Array.from(fileInput.files || []);
  fileInput.value = "";

  if(!currentAlbum){
    alert("Select an album first.");
    return;
  }
  if(files.length === 0) return;

  const sigRes = await fetch(`${API_BASE}/api/upload`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ albumName: currentAlbum })
  });
  const sig = await sigRes.json();

  if(!sig.ok){
    alert("Upload signature error: " + (sig.detail || sig.error || "Unknown"));
    return;
  }

  for(const file of files){
    const form = new FormData();
    form.append("file", file);
    form.append("api_key", sig.apiKey);
    form.append("timestamp", sig.timestamp);
    form.append("signature", sig.signature);
    form.append("folder", sig.folder);

    const up = await fetch(`https://api.cloudinary.com/v1_1/${sig.cloudName}/auto/upload`,{
      method:"POST",
      body: form
    });

    if(!up.ok){
      const err = await up.json().catch(()=>({}));
      alert("Upload failed: " + (err?.error?.message || "Unknown"));
      return;
    }
  }

  await openAlbum(currentAlbum);
});

// Init
loadAlbums();
</script>

</body>
</html>
