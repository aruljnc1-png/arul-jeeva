<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Arul & Jeeva</title>

<style>

:root{
  --bg:#0b0b12;
  --card:rgba(255,255,255,.08);
  --card2:rgba(255,255,255,.12);
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.65);
  --border:rgba(255,255,255,.14);
  --shadow:0 10px 30px rgba(0,0,0,.35);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(900px 500px at 20% 10%, rgba(140, 70, 255, 0.25), transparent 60%),
    radial-gradient(900px 500px at 80% 20%, rgba(0, 220, 255, 0.18), transparent 60%),
    radial-gradient(1000px 600px at 50% 90%, rgba(255, 70, 180, 0.14), transparent 60%),
    var(--bg);
  min-height:100vh;
}

header{
  text-align:center;
  padding:18px;
}

.brand-title{
  font-size:28px;
  font-weight:900;
}

.brand-sub{
  font-size:14px;
  color:var(--muted);
  margin-top:6px;
}

.hero{
  max-width:1100px;
  margin:auto;
  padding:18px;
}

.hero img{
  width:100%;
  border-radius:18px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
}

main{
  max-width:1100px;
  margin:auto;
  padding:18px;
}

h2{
  margin-bottom:12px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;
}

.cardBtn{
  border:1px solid var(--border);
  border-radius:18px;
  background:var(--card);
  padding:12px;
  cursor:pointer;
  box-shadow:var(--shadow);
  transition:.15s;
}

.cardBtn:hover{
  transform:translateY(-3px);
  background:var(--card2);
}

.albumThumb{
  width:100%;
  height:180px;
  border-radius:14px;
  overflow:hidden;
  margin-bottom:10px;
  border:1px solid var(--border);
}

.albumThumb img,
.albumThumb video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.cardTitle{
  font-weight:800;
}

.cardSub{
  font-size:12px;
  color:var(--muted);
}

.imagesGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;
}

.imgCard{
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--border);
}

.imgCard img,
.imgCard video{
  width:100%;
  height:200px;
  object-fit:cover;
}

.hidden{
  display:none;
}

.actionsBottom{
  margin-top:20px;
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn{
  padding:12px 16px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  cursor:pointer;
}

.uploadLabel{
  padding:12px 16px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--card);
  cursor:pointer;
}

.uploadLabel input{
  display:none;
}

.status{
  margin-top:14px;
  text-align:center;
  color:var(--muted);
}

</style>
</head>


<body>


<header>

<div class="brand-title">
Arul & Jeeva
</div>

<div class="brand-sub">
Every shared moment is a meditation, a bridge connecting our inner worlds.
</div>

</header>


<section class="hero">

<img src="https://res.cloudinary.com/dtamlqfx3/image/upload/v1771768963/spiritual-section_cmf3ue.png">

</section>



<main>

<section id="albumsView">

<h2>Albums</h2>

<div id="albumsGrid" class="grid"></div>

</section>


<section id="imagesView" class="hidden">

<button onclick="goBack()" class="btn">
← Back
</button>

<h2 id="albumTitle"></h2>

<div id="imagesGrid" class="imagesGrid"></div>

</section>


<div class="actionsBottom">

<button onclick="createAlbum()" class="btn">
+ New Album
</button>

<label class="uploadLabel">
Upload
<input id="fileInput" type="file" multiple accept="image/*,video/*">
</label>

<button onclick="loadAlbums()" class="btn">
Refresh
</button>

</div>


<div id="status" class="status"></div>

</main>



<script>

const API_BASE =
"https://arul-jeeva.vercel.app";


const albumsGrid =
document.getElementById("albumsGrid");

const imagesGrid =
document.getElementById("imagesGrid");

const albumTitle =
document.getElementById("albumTitle");

const albumsView =
document.getElementById("albumsView");

const imagesView =
document.getElementById("imagesView");

const status =
document.getElementById("status");

const fileInput =
document.getElementById("fileInput");


let currentAlbum = null;



function setStatus(msg){
status.textContent = msg || "";
}



function goBack(){

imagesView.classList.add("hidden");

albumsView.classList.remove("hidden");

currentAlbum = null;

}



async function getAlbumThumb(path){

const url =
`${API_BASE}/api/images?album=${encodeURIComponent(path)}&max=1`;

const res =
await fetch(url);

const data =
await res.json();

if(!data.ok || !data.images.length)
return null;

return data.images[0];

}



async function loadAlbums(){

setStatus("");

albumsGrid.innerHTML = "";

imagesView.classList.add("hidden");

albumsView.classList.remove("hidden");

const res =
await fetch(`${API_BASE}/api/albums`);

const data =
await res.json();

if(!data.ok){
setStatus("Failed to load albums");
return;
}


for(const album of data.albums){

const card =
document.createElement("div");

card.className = "cardBtn";

card.onclick =
()=>openAlbum(album.path);


card.innerHTML =
`
<div class="albumThumb" id="thumb-${album.path}"></div>

<div class="cardTitle">${album.name}</div>

<div class="cardSub">${album.path}</div>
`;

albumsGrid.appendChild(card);


const thumb =
await getAlbumThumb(album.path);

const holder =
document.getElementById(`thumb-${album.path}`);

if(thumb){

if(thumb.resource_type==="video"){

holder.innerHTML =
`<video src="${thumb.secure_url}" muted></video>`;

}
else{

holder.innerHTML =
`<img src="${thumb.secure_url}">`;

}

}

}

}



async function openAlbum(path){

currentAlbum = path;

albumTitle.textContent = path;

albumsView.classList.add("hidden");

imagesView.classList.remove("hidden");

imagesGrid.innerHTML = "";

const res =
await fetch(`${API_BASE}/api/images?album=${encodeURIComponent(path)}&max=100`);

const data =
await res.json();

if(!data.ok){

setStatus("Failed to fetch images");

return;

}


for(const img of data.images){

const card =
document.createElement("div");

card.className="imgCard";


if(img.resource_type==="video"){

card.innerHTML =
`<video src="${img.secure_url}" controls></video>`;

}
else{

card.innerHTML =
`<img src="${img.secure_url}">`;

}

imagesGrid.appendChild(card);

}

}



async function createAlbum(){

const name =
prompt("Album name:");

if(!name)
return;

currentAlbum = name;

setStatus("Album created. Upload files.");

}



fileInput.onchange =
async function(){

if(!currentAlbum){

setStatus("Select album first");

return;

}


const sigRes =
await fetch(`${API_BASE}/api/upload`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
albumName:currentAlbum
})

});

const sig =
await sigRes.json();


for(const file of fileInput.files){

const form =
new FormData();

form.append("file",file);

form.append("api_key",sig.apiKey);

form.append("timestamp",sig.timestamp);

form.append("signature",sig.signature);

form.append("folder",sig.folder);

await fetch(
`https://api.cloudinary.com/v1_1/${sig.cloudName}/auto/upload`,
{
method:"POST",
body:form
}
);

}


setStatus("Upload complete");

openAlbum(currentAlbum);

};



loadAlbums();

</script>


</body>
</html>
