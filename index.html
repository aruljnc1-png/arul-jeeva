<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Arul & Jeeva</title>

<style>
:root{
  --bg:#0b0b12;
  --card:rgba(255,255,255,.08);
  --card2:rgba(255,255,255,.12);
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.65);
  --border:rgba(255,255,255,.14);
  --shadow:0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(900px 500px at 20% 10%, rgba(140,70,255,.25), transparent 60%),
    radial-gradient(900px 500px at 80% 20%, rgba(0,220,255,.18), transparent 60%),
    radial-gradient(1000px 600px at 50% 90%, rgba(255,70,180,.14), transparent 60%),
    var(--bg);
  min-height:100vh;
}

header{ text-align:center; padding:18px; }
.brand-title{ font-size:28px; font-weight:900; }
.brand-sub{ color:var(--muted); margin-top:6px; }

.hero{ max-width:1100px; margin:auto; padding:18px; }
.hero img{
  width:100%;
  border-radius:18px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  display:block;
}

main{ max-width:1100px; margin:auto; padding:18px; }

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;
}

.cardBtn{
  border:1px solid var(--border);
  border-radius:18px;
  background:var(--card);
  padding:12px;
  cursor:pointer;
  box-shadow:var(--shadow);
  transition:.15s;
}
.cardBtn:hover{ background:var(--card2); transform:translateY(-2px); }

.albumThumb{
  width:100%;
  height:180px;
  border-radius:14px;
  overflow:hidden;
  margin-bottom:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.06);
  display:flex;
  align-items:center;
  justify-content:center;
  color:rgba(255,255,255,.55);
  font-size:12px;
}
.albumThumb img, .albumThumb video{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  background:#000;
}

.cardTitle{ font-weight:900; }
.cardSub{ color:var(--muted); font-size:12px; margin-top:6px; }

.imagesGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;
}

.imgCard{
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--border);
  background:rgba(255,255,255,.05);
  box-shadow:var(--shadow);
}
.imgCard img, .imgCard video{
  width:100%;
  height:200px;
  object-fit:cover;
  display:block;
  cursor:pointer;
  background:#000;
}

.actionsBottom{
  margin-top:20px;
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn, .uploadLabel{
  padding:12px 16px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  cursor:pointer;
}
.uploadLabel input{ display:none; }

.hidden{ display:none !important; }

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.95);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.lightboxContent{
  position:relative;
  max-width:95%;
  max-height:95%;
}
.lightbox img,
.lightbox video{
  max-width:95vw;
  max-height:90vh;
  display:block;
}
.lightboxClose{
  position:absolute;
  top:-10px;
  right:-10px;
  width:40px;
  height:40px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.10);
  color:#fff;
  font-size:26px;
  line-height:36px;
  text-align:center;
  cursor:pointer;
  user-select:none;
}
.smallNote{
  text-align:center;
  color:var(--muted);
  font-size:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <div class="brand-title">Arul & Jeeva</div>
  <div class="brand-sub">Every shared moment is a meditation, a bridge connecting our inner worlds.</div>
</header>

<section class="hero">
  <img src="https://res.cloudinary.com/dtamlqfx3/image/upload/v1771768963/spiritual-section_cmf3ue.png" alt="Spiritual">
</section>

<main>

  <section id="albumsView">
    <h2>Albums</h2>
    <div id="albumsGrid" class="grid"></div>
    <div class="smallNote">Tip: click an album to view photos. Upload adds into the selected album.</div>
  </section>

  <section id="imagesView" class="hidden">
    <button id="backBtn" class="btn">← Back</button>
    <h2 id="albumTitle"></h2>
    <div id="imagesGrid" class="imagesGrid"></div>
  </section>

  <div class="actionsBottom">
    <button id="newAlbumBtn" class="btn">+ New Album</button>

    <label class="uploadLabel">
      Upload
      <input id="fileInput" type="file" multiple accept="image/*,video/*">
    </label>

    <button id="refreshBtn" class="btn">Refresh</button>
  </div>

</main>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox hidden">
  <div class="lightboxContent" id="lightboxContent">
    <div class="lightboxClose" id="lightboxClose">×</div>
    <img id="lightboxImg" class="hidden" alt="">
    <video id="lightboxVideo" class="hidden" controls playsinline></video>
  </div>
</div>

<script>
const API_BASE = "https://arul-jeeva.vercel.app";

const albumsGrid = document.getElementById("albumsGrid");
const imagesGrid = document.getElementById("imagesGrid");
const albumTitle = document.getElementById("albumTitle");
const albumsView = document.getElementById("albumsView");
const imagesView = document.getElementById("imagesView");
const fileInput = document.getElementById("fileInput");

const backBtn = document.getElementById("backBtn");
const refreshBtn = document.getElementById("refreshBtn");
const newAlbumBtn = document.getElementById("newAlbumBtn");

let currentAlbum = null;

// Lightbox refs
const lightbox = document.getElementById("lightbox");
const lightboxContent = document.getElementById("lightboxContent");
const lightboxClose = document.getElementById("lightboxClose");
const lightboxImg = document.getElementById("lightboxImg");
const lightboxVideo = document.getElementById("lightboxVideo");

// Close when clicking outside content
lightbox.addEventListener("click", () => closeLightbox());
// Prevent closing when clicking the content itself
lightboxContent.addEventListener("click", (e) => e.stopPropagation());
lightboxClose.addEventListener("click", (e) => { e.stopPropagation(); closeLightbox(); });

function showAlbums(){
  imagesView.classList.add("hidden");
  albumsView.classList.remove("hidden");
  currentAlbum = null;
}

function showImages(albumPath){
  albumsView.classList.add("hidden");
  imagesView.classList.remove("hidden");
  currentAlbum = albumPath;
  albumTitle.textContent = albumPath;
}

async function getThumbItem(albumPath){
  const url = `${API_BASE}/api/images?album=${encodeURIComponent(albumPath)}&max=1`;
  const res = await fetch(url, { cache: "no-store" });
  const data = await res.json();
  if(!data.ok) return null;
  const first = (data.images || [])[0];
  return first || null;
}

async function loadAlbums(){
  showAlbums();
  albumsGrid.innerHTML = "";

  const res = await fetch(`${API_BASE}/api/albums`, { cache: "no-store" });
  const data = await res.json();

  if(!data.ok){
    albumsGrid.innerHTML = `<div style="color:rgba(255,255,255,.7)">Failed to load albums: ${data.detail || data.error || "Unknown"}</div>`;
    return;
  }

  for(const album of (data.albums || [])){
    const card = document.createElement("div");
    card.className = "cardBtn";
    card.addEventListener("click", () => openAlbum(album.path));

    const thumbDiv = document.createElement("div");
    thumbDiv.className = "albumThumb";
    thumbDiv.textContent = "Loading cover…";
    thumbDiv.dataset.album = album.path;

    const titleDiv = document.createElement("div");
    titleDiv.className = "cardTitle";
    titleDiv.textContent = album.name;

    const subDiv = document.createElement("div");
    subDiv.className = "cardSub";
    subDiv.textContent = album.path;

    card.appendChild(thumbDiv);
    card.appendChild(titleDiv);
    card.appendChild(subDiv);

    albumsGrid.appendChild(card);
  }

  // Load thumbs after rendering (so UI appears immediately)
  const thumbHolders = Array.from(document.querySelectorAll(".albumThumb[data-album]"));
  for(const holder of thumbHolders){
    const albumPath = holder.dataset.album;
    try{
      const item = await getThumbItem(albumPath);
      if(!item){
        holder.textContent = "No photos yet";
        continue;
      }

      const url = item.secure_url;
      const isVideo = item.resource_type === "video" || /\.(mp4|mov|webm|m4v)(\?|$)/i.test(url);

      holder.innerHTML = isVideo
        ? `<video src="${url}" muted playsinline preload="metadata"></video>`
        : `<img src="${url}" loading="lazy" alt="">`;
    }catch(e){
      holder.textContent = "No cover";
    }
  }
}

async function openAlbum(albumPath){
  showImages(albumPath);
  imagesGrid.innerHTML = "";

  const res = await fetch(`${API_BASE}/api/images?album=${encodeURIComponent(albumPath)}&max=100`, { cache:"no-store" });
  const data = await res.json();

  if(!data.ok){
    imagesGrid.innerHTML = `<div style="color:rgba(255,255,255,.7)">Failed to load images: ${data.detail || data.error || "Unknown"}</div>`;
    return;
  }

  for(const item of (data.images || [])){
    const card = document.createElement("div");
    card.className = "imgCard";

    const url = item.secure_url;
    const isVideo = item.resource_type === "video" || /\.(mp4|mov|webm|m4v)(\?|$)/i.test(url);

    if(isVideo){
      const vid = document.createElement("video");
      vid.src = url;
      vid.controls = true;
      vid.playsInline = true;
      vid.addEventListener("click", (e) => { e.preventDefault(); e.stopPropagation(); openLightbox(url, "video"); });
      card.appendChild(vid);
    }else{
      const img = document.createElement("img");
      img.src = url;
      img.loading = "lazy";
      img.addEventListener("click", (e) => { e.preventDefault(); e.stopPropagation(); openLightbox(url, "image"); });
      card.appendChild(img);
    }

    imagesGrid.appendChild(card);
  }
}

function openLightbox(url, type){
  lightbox.classList.remove("hidden");

  if(type === "video"){
    lightboxImg.classList.add("hidden");
    lightboxVideo.classList.remove("hidden");
    lightboxVideo.src = url;
    lightboxVideo.currentTime = 0;
    // autoplay is often blocked; user can hit play
  }else{
    lightboxVideo.classList.add("hidden");
    lightboxImg.classList.remove("hidden");
    lightboxImg.src = url;
  }
}

function closeLightbox(){
  lightbox.classList.add("hidden");
  // stop video + free memory
  lightboxVideo.pause();
  lightboxVideo.removeAttribute("src");
  lightboxVideo.load();
  lightboxImg.removeAttribute("src");
}

async function createAlbum(){
  const name = prompt("Album name:");
  if(!name) return;
  const trimmed = name.trim();
  if(!trimmed) return;
  // Cloudinary folder is created on first upload, so we just switch to it
  await openAlbum(trimmed);
}

fileInput.addEventListener("change", async () => {
  const files = Array.from(fileInput.files || []);
  fileInput.value = "";

  if(!currentAlbum){
    alert("Select an album first.");
    return;
  }
  if(files.length === 0) return;

  // get signature
  const sigRes = await fetch(`${API_BASE}/api/upload`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ albumName: currentAlbum })
  });
  const sig = await sigRes.json();

  if(!sig.ok){
    alert("Upload signature error: " + (sig.detail || sig.error || "Unknown"));
    return;
  }

  for(const file of files){
    const form = new FormData();
    form.append("file", file);
    form.append("api_key", sig.apiKey);
    form.append("timestamp", sig.timestamp);
    form.append("signature", sig.signature);
    form.append("folder", sig.folder);

    const up = await fetch(`https://api.cloudinary.com/v1_1/${sig.cloudName}/auto/upload`, {
      method:"POST",
      body: form
    });
    if(!up.ok){
      const err = await up.json().catch(()=>({}));
      alert("Upload failed: " + (err?.error?.message || "Unknown"));
      return;
    }
  }

  // refresh album after upload
  await openAlbum(currentAlbum);
});

backBtn.addEventListener("click", () => showAlbums());
refreshBtn.addEventListener("click", async () => {
  if(currentAlbum) await openAlbum(currentAlbum);
  else await loadAlbums();
});
newAlbumBtn.addEventListener("click", () => createAlbum());

// init
loadAlbums();
</script>

</body>
</html>
