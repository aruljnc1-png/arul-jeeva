<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arul & Jeeva</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Arul & Jeeva</h1>
    <p class="love-line">
      "Every shared moment is a meditation, a bridge connecting our inner worlds."
    </p>
  </header>

  <!-- Spiritual Section -->
  <section id="spiritual-section">
    <div class="ripple-wrapper">
      <img 
        src="assets/images/spiritual-section.png" 
        alt="Arul and Jeeva – Yin Yang Om and Doves"
        class="spiritual-image"
      />
      <span class="ripple"></span>
    </div>
  </section>

  <!-- Albums Section -->
  <section id="albums-section">
    <!-- All albums will appear here -->
    <div id="albums-container"></div>
  </section>

  <button id="upload-btn">📸 Upload a Moment</button>

  <!-- Lightbox -->
  <div id="lightbox">
    <img id="lightbox-img" src="" alt="Full Size">
  </div>

  <script src="script.js"></script>
</body>
</html>
