<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Arul & Jeeva</title>
<style>
body{margin:0;font-family:system-ui;background:#050714;color:#fff}
.hidden{display:none}
.lock{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#050714;z-index:9999}
.lockBox{background:#111;border:1px solid #333;padding:24px;border-radius:12px;text-align:center}
input,textarea,select,button{padding:10px;border-radius:8px;border:1px solid #333;background:#111;color:#fff}
button{cursor:pointer}
.journal{max-width:700px;margin:120px auto 40px;padding:20px;border:1px solid #333;border-radius:12px}
.journalItem{border:1px solid #333;padding:12px;border-radius:10px;margin-bottom:10px}
.tag{font-size:12px;opacity:.7}
</style>
</head>
<body>

<div id="lockScreen" class="lock">
  <div class="lockBox">
    <h3>Private Space</h3>
    <input id="passwordInput" type="password" placeholder="Enter password">
    <br><br>
    <button id="enterBtn">Enter</button>
    <div id="lockError" style="color:#ff6b6b;display:none;margin-top:10px">Wrong password</div>
  </div>
</div>

<div class="journal">
  <h2>Our Journal</h2>

  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">
    <input type="date" id="journalDate">
    <select id="journalFilterTag"><option value="">All tags</option></select>
    <input type="text" id="journalSearch" placeholder="Search...">
    <button id="journalSearchBtn">Search</button>
    <button id="journalClearBtn">Clear</button>
  </div>

  <select id="journalTag"></select>
  <br><br>
  <textarea id="journalText" rows="3" style="width:100%" placeholder="Write something..."></textarea>
  <br><br>
  <button id="journalPostBtn">Post</button>

  <div id="journalFeed" style="margin-top:20px"></div>
</div>

<!-- LOCK (isolated so lock still works even if other JS breaks) -->
<script>
(function(){
  const PASS="1111";
  const lock=document.getElementById("lockScreen");
  const input=document.getElementById("passwordInput");
  const btn=document.getElementById("enterBtn");
  const err=document.getElementById("lockError");

  function unlock(){
    if(String(input.value||"")===PASS){
      localStorage.setItem("siteUnlocked","true");
      lock.style.display="none";
    }else{
      err.style.display="block";
    }
  }

  if(localStorage.getItem("siteUnlocked")==="true"){
    lock.style.display="none";
  }

  btn.onclick=unlock;
  input.addEventListener("keydown",e=>{if(e.key==="Enter")unlock();});
})();
</script>

<!-- JOURNAL -->
<script>
const TAGS=["Love","Joy","Reflection","Healing","Growth","Gratitude","Peace","Hope","Longing","Missing You","Prayer","Celebration","Stress","Anxiety","Sadness","Anger"];
const token="1111"; // must match Vercel JOURNAL_TOKEN if you enabled it

const journalDate=document.getElementById("journalDate");
const journalFilterTag=document.getElementById("journalFilterTag");
const journalSearch=document.getElementById("journalSearch");
const journalSearchBtn=document.getElementById("journalSearchBtn");
const journalClearBtn=document.getElementById("journalClearBtn");
const journalTag=document.getElementById("journalTag");
const journalText=document.getElementById("journalText");
const journalPostBtn=document.getElementById("journalPostBtn");
const journalFeed=document.getElementById("journalFeed");

function headers(extra){
  return {
    ...(token?{"x-journal-token":token}:{}),
    ...(extra||{})
  };
}

function initTags(){
  journalTag.innerHTML="";
  journalFilterTag.innerHTML='<option value="">All tags</option>';
  TAGS.forEach(t=>{
    const o1=document.createElement("option");
    o1.value=t;o1.textContent=t;
    journalTag.appendChild(o1);

    const o2=document.createElement("option");
    o2.value=t;o2.textContent=t;
    journalFilterTag.appendChild(o2);
  });
  journalTag.value="Reflection";
}
initTags();

function render(entries){
  journalFeed.innerHTML="";
  if(!entries.length){
    journalFeed.innerHTML="No journal entries yet.";
    return;
  }
  entries.forEach(e=>{
    const div=document.createElement("div");
    div.className="journalItem";
    div.innerHTML=`<div class="tag">${(e.tag||"")} · ${new Date(e.createdAt).toLocaleString()}</div>
                   <div>${(e.text||"")}</div>`;
    journalFeed.appendChild(div);
  });
}

async function loadJournal(){
  const res=await fetch("/api/journal",{headers:headers(), cache:"no-store"});
  const data=await res.json().catch(()=>({ok:false}));

  if(!data.ok){
    journalFeed.innerHTML="Error loading journal.";
    return;
  }

  let entries=data.entries||[];

  // Local date filter (fixes UTC mismatch)
  if(journalDate.value){
    entries=entries.filter(e=>{
      const d=new Date(e.createdAt);
      const y=d.getFullYear();
      const m=String(d.getMonth()+1).padStart(2,"0");
      const day=String(d.getDate()).padStart(2,"0");
      return `${y}-${m}-${day}`===journalDate.value;
    });
  }
  if(journalFilterTag.value){
    entries=entries.filter(e=>String(e.tag||"")===journalFilterTag.value);
  }
  if(journalSearch.value.trim()){
    const q=journalSearch.value.toLowerCase();
    entries=entries.filter(e=>String(e.text||"").toLowerCase().includes(q));
  }

  render(entries);
}

journalPostBtn.onclick=async()=>{
  const text=journalText.value.trim();
  if(!text) return alert("Write something first");

  const r = await fetch("/api/journal",{
    method:"POST",
    headers:headers({"Content-Type":"application/json"}),
    body:JSON.stringify({ text, tag: journalTag.value })
  });

  const out = await r.json().catch(()=>({ok:false}));
  if(!out.ok){
    alert("Failed to post: " + (out.detail || out.error || "Unknown"));
    return;
  }

  // Clear inputs + filters so you SEE the new post
  journalText.value="";
  journalDate.value="";
  journalFilterTag.value="";
  journalSearch.value="";
  journalTag.value="Reflection";

  loadJournal();
};

journalSearchBtn.onclick=(e)=>{ e.preventDefault(); loadJournal(); };
journalClearBtn.onclick=(e)=>{
  e.preventDefault();
  journalDate.value="";
  journalFilterTag.value="";
  journalSearch.value="";
  loadJournal();
};

loadJournal();
</script>

</body>
</html>
