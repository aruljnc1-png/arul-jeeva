<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Arul & Jeeva — Albums</title>

  <style>
    :root{
      --bg:#0b0b12;
      --card:rgba(255,255,255,.08);
      --card2:rgba(255,255,255,.12);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.65);
      --border:rgba(255,255,255,.14);
      --shadow:0 10px 30px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(140, 70, 255, 0.25), transparent 60%),
        radial-gradient(900px 500px at 80% 20%, rgba(0, 220, 255, 0.18), transparent 60%),
        radial-gradient(1000px 600px at 50% 90%, rgba(255, 70, 180, 0.14), transparent 60%),
        var(--bg);
      min-height:100vh;
    }
    header{
      position:sticky; top:0; z-index:10;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:14px 18px;
      border-bottom:1px solid var(--border);
      background:rgba(10,10,18,.75);
      backdrop-filter:blur(10px);
    }
    .brand-title{font-weight:900; letter-spacing:.2px}
    .brand-sub{font-size:12px; color:var(--muted); margin-top:2px}
    .actions{display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end}
    .btn{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.10);
      color:var(--text);
      cursor:pointer;
      box-shadow:var(--shadow);
    }
    .btn:hover{background:rgba(255,255,255,.14)}
    .btn.ghost{background:transparent; box-shadow:none}
    .uploadLabel{
      display:inline-flex; align-items:center; gap:8px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.10);
      cursor:pointer;
      box-shadow:var(--shadow);
    }
    .uploadLabel:hover{background:rgba(255,255,255,.14)}
    .uploadLabel input{display:none}

    main{max-width:1100px; margin:0 auto; padding:18px}
    .status{
      margin:10px 0 16px;
      padding:12px 14px;
      border:1px solid var(--border);
      border-radius:14px;
      background:rgba(255,255,255,.08);
      color:var(--muted);
      text-align:left;
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size:12px;
      white-space:pre-wrap;
    }
    h2{margin:16px 0 10px; font-size:20px}
    .grid{
      display:grid;
      grid-template-columns:repeat(1,minmax(0,1fr));
      gap:12px;
    }
    @media(min-width:520px){ .grid{grid-template-columns:repeat(2,minmax(0,1fr));} }
    @media(min-width:900px){ .grid{grid-template-columns:repeat(3,minmax(0,1fr));} }

    .cardBtn{
      text-align:left;
      border:1px solid var(--border);
      border-radius:18px;
      background:var(--card);
      padding:14px;
      box-shadow:var(--shadow);
      cursor:pointer;
      transition:transform .12s ease, background .12s ease;
      color:var(--text);
    }
    .cardBtn:hover{transform:translateY(-2px); background:var(--card2)}
    .cardTitle{font-weight:900}
    .cardSub{margin-top:6px; font-size:12px; color:var(--muted)}

    .imagesGrid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }
    @media(min-width:700px){ .imagesGrid{grid-template-columns:repeat(3,minmax(0,1fr));} }
    @media(min-width:1000px){ .imagesGrid{grid-template-columns:repeat(4,minmax(0,1fr));} }

    .imgCard{
      border:1px solid var(--border);
      border-radius:18px;
      overflow:hidden;
      background:var(--card);
      box-shadow:var(--shadow);
    }
    .imgCard img, .imgCard video{
      width:100%; height:220px; object-fit:cover; display:block;
      background:#000;
    }
    .hidden{display:none !important}

    .hero{
      max-width:1100px;
      margin:0 auto;
      padding:18px;
    }
    .hero img{
      width:100%;
      border-radius:18px;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      display:block;
    }
  </style>
</head>

<body>
<header>
  <div>
    <div class="brand-title">Arul & Jeeva</div>
    <div class="brand-sub">
      Every shared moment is a meditation, a bridge connecting our inner worlds.
    </div>
  </div>

  <div class="actions">
    <button id="backBtn" class="btn ghost hidden">← Back</button>
    <button id="newAlbumBtn" class="btn">+ New Album</button>
    <label class="uploadLabel" title="Upload photos/videos to the selected album">
      ⬆ Upload
      <input id="fileInput" type="file" accept="image/*,video/*" multiple />
    </label>
    <button id="refreshBtn" class="btn">Refresh</button>
  </div>
</header>

<section class="hero">
  <img
    src="https://res.cloudinary.com/dtamlqfx3/image/upload/v1771768963/spiritual-section_cmf3ue.png"
    alt="Spiritual"
  />
</section>

<main>
  <div id="status" class="status">Loading…</div>

  <section id="albumsView">
    <h2>Albums</h2>
    <div id="albumsGrid" class="grid"></div>
  </section>

  <section id="imagesView" class="hidden">
    <h2 id="albumTitle"></h2>
    <div id="imagesGrid" class="imagesGrid"></div>
  </section>
</main>

<script>
  // Production backend
  const API_BASE = "https://arul-jeeva.vercel.app";

  const statusEl = document.getElementById("status");
  const albumsView = document.getElementById("albumsView");
  const imagesView = document.getElementById("imagesView");
  const albumsGrid = document.getElementById("albumsGrid");
  const imagesGrid = document.getElementById("imagesGrid");
  const albumTitle = document.getElementById("albumTitle");

  const refreshBtn = document.getElementById("refreshBtn");
  const backBtn = document.getElementById("backBtn");
  const newAlbumBtn = document.getElementById("newAlbumBtn");
  const fileInput = document.getElementById("fileInput");

  let currentAlbumPath = null;

  function setStatus(msg) { statusEl.textContent = msg; }

  function showAlbums() {
    currentAlbumPath = null;
    albumsView.classList.remove("hidden");
    imagesView.classList.add("hidden");
    backBtn.classList.add("hidden");
    setStatus("Loading albums…");
  }

  function showImages(albumPath, albumName) {
    currentAlbumPath = albumPath;
    albumsView.classList.add("hidden");
    imagesView.classList.remove("hidden");
    backBtn.classList.remove("hidden");
    albumTitle.textContent = albumName || albumPath;
  }

  async function loadAlbums() {
    showAlbums();
    albumsGrid.innerHTML = "";

    try {
      const res = await fetch(`${API_BASE}/api/albums`, { cache: "no-store" });
      const data = await res.json();

      if (!data.ok) {
        setStatus(`Albums error: ${data.detail || data.error || "Unknown"}`);
        return;
      }

      if (!data.albums || data.albums.length === 0) {
        setStatus("No albums found.");
        return;
      }

      setStatus(`Loaded ${data.albums.length} albums.`);

      for (const a of data.albums) {
        const btn = document.createElement("button");
        btn.className = "cardBtn";
        btn.type = "button";
        btn.innerHTML = `
          <div class="cardTitle">${a.name}</div>
          <div class="cardSub">${a.path}</div>
        `;
        btn.addEventListener("click", () => openAlbum(a.path, a.name));
        albumsGrid.appendChild(btn);
      }
    } catch (e) {
      setStatus(`FETCH FAILED: ${e.message}`);
    }
  }

  async function openAlbum(albumPath, albumName) {
    showImages(albumPath, albumName);
    imagesGrid.innerHTML = "";
    setStatus(`Loading images for: ${albumPath}`);

    try {
      const url = new URL(`${API_BASE}/api/images`);
      url.searchParams.set("album", albumPath);
      url.searchParams.set("max", "80");

      const res = await fetch(url.toString(), { cache: "no-store" });
      const data = await res.json();

      if (!data.ok) {
        setStatus(`Images error: ${data.detail || data.error || "Unknown"}`);
        return;
      }

      const items = data.images || [];
      setStatus(`Loaded ${items.length} items from: ${albumPath}`);

      for (const item of items) {
        const card = document.createElement("div");
        card.className = "imgCard";

        const url = item.secure_url || "";
        const isVideo =
          item.resource_type === "video" ||
          /\.(mp4|mov|webm|m4v)(\?|$)/i.test(url);

        card.innerHTML = isVideo
          ? `<video src="${url}" controls preload="metadata"></video>`
          : `<img src="${url}" loading="lazy" alt="" />`;

        imagesGrid.appendChild(card);
      }
    } catch (e) {
      setStatus(`FETCH FAILED: ${e.message}`);
    }
  }

  async function createAlbumFlow() {
    const name = prompt("New album name (example: Valentines 2027):");
    if (!name) return;

    // We rely on first upload to create the folder in Cloudinary
    setStatus(`New album selected: ${name}\nNow upload files to create it.`);
    currentAlbumPath = name.trim();
    showImages(currentAlbumPath, currentAlbumPath);
    imagesGrid.innerHTML = "";
  }

  async function uploadFiles(files) {
    if (!files || files.length === 0) return;

    if (!currentAlbumPath) {
      setStatus("Select an album first (click an album), then upload.");
      return;
    }

    setStatus(`Preparing upload for album: ${currentAlbumPath}`);

    // Get signature from backend
    let sig;
    try {
      const res = await fetch(`${API_BASE}/api/upload`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ albumName: currentAlbumPath }),
      });
      sig = await res.json();
      if (!sig.ok) {
        setStatus(`Upload signature error: ${sig.detail || sig.error || "Unknown"}`);
        return;
      }
    } catch (e) {
      setStatus(`Signature fetch failed: ${e.message}`);
      return;
    }

    // Direct upload to Cloudinary
    let done = 0;
    for (const file of files) {
      done++;
      setStatus(`Uploading ${done}/${files.length}: ${file.name}`);

      const form = new FormData();
      form.append("file", file);
      form.append("api_key", sig.apiKey);
      form.append("timestamp", sig.timestamp);
      form.append("signature", sig.signature);
      form.append("folder", sig.folder);

      const cloudUrl = `https://api.cloudinary.com/v1_1/${sig.cloudName}/auto/upload`;

      const upRes = await fetch(cloudUrl, { method: "POST", body: form });
      const out = await upRes.json();

      if (!upRes.ok) {
        setStatus(`Upload failed: ${out?.error?.message || "Unknown error"}`);
        return;
      }
    }

    setStatus(`Upload complete. Refreshing album…`);
    await openAlbum(currentAlbumPath, currentAlbumPath);
  }

  refreshBtn.addEventListener("click", () => {
    if (currentAlbumPath) openAlbum(currentAlbumPath, currentAlbumPath);
    else loadAlbums();
  });

  backBtn.addEventListener("click", loadAlbums);
  newAlbumBtn.addEventListener("click", createAlbumFlow);

  fileInput.addEventListener("change", async (e) => {
    const files = Array.from(e.target.files || []);
    e.target.value = "";
    await uploadFiles(files);
  });

  loadAlbums();
</script>
</body>
</html>
